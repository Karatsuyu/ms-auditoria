# =============================================================================
# ms-auditoria | GitHub Actions CI/CD Pipeline
# =============================================================================
# Ejecuta tests unitarios (SQLite) + tests de integración (PostgreSQL)
# en cada push/PR. Construye imagen Docker en merge a main.
# =============================================================================

name: CI/CD ms-auditoria

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: ci_test_password
  POSTGRES_DB: ms_auditoria_test

jobs:
  # ── Lint & Type Check ─────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint & Syntax"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check syntax errors
        run: python -m py_compile app/main.py

      - name: Verify imports
        run: python -c "from app.main import app; print('✅ Import OK')"

  # ── Unit Tests (SQLite) ───────────────────────────────────────────────────
  test-unit:
    name: "🧪 Unit Tests (SQLite)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          DATABASE_URL: "sqlite:///./test.db"
          AES_SECRET_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          APP_ENV: "testing"
        run: |
          pytest tests/ \
            --ignore=tests/test_integration_postgres.py \
            -v \
            --tb=short \
            -q

  # ── Integration Tests (PostgreSQL) ────────────────────────────────────────
  test-integration:
    name: "🐘 Integration Tests (PostgreSQL)"
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: "postgresql+psycopg2://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}"
          AES_SECRET_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          APP_ENV: "testing"
        run: alembic upgrade head

      - name: Run integration tests
        env:
          DATABASE_URL: "postgresql+psycopg2://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}"
          TEST_POSTGRES_URL: "postgresql+asyncpg://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}"
          AES_SECRET_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          APP_ENV: "testing"
        run: |
          pytest tests/test_integration_postgres.py -v --tb=short

  # ── Docker Build ──────────────────────────────────────────────────────────
  docker:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ms-auditoria:${{ github.sha }} .
          docker build -t ms-auditoria:latest .

      - name: Verify image
        run: |
          docker images ms-auditoria
          echo "✅ Docker image built successfully"

      # Opcional: push a registry (desactivado por defecto)
      # - name: Push to registry
      #   run: |
      #     docker tag ms-auditoria:latest ghcr.io/${{ github.repository }}:latest
      #     docker push ghcr.io/${{ github.repository }}:latest
