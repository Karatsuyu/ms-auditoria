# =============================================================================
# ms-auditoria | docker-compose.yml
# =============================================================================
# Orquestación de contenedores para desarrollo local y producción.
# Incluye: PostgreSQL 16 + ms-auditoria + red del ERP
# =============================================================================

version: "3.9"

services:
  # ── Base de datos PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ms-auditoria-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Ame
      POSTGRES_DB: ms_auditoria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - erp-net

  # ── Microservicio de Auditoría ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ms-auditoria-app
    ports:
      - "8019:8019"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:Ame@db:5432/ms_auditoria
      AES_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      MS_AUTENTICACION_URL: http://ms-autenticacion:8001/api/v1
      MS_ROLES_URL: http://ms-roles-permisos:8002/api/v1
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_LEVEL: INFO
      DB_POOL_SIZE: 20
      DB_MAX_OVERFLOW: 40
      DB_POOL_RECYCLE: 3600
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - erp-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

networks:
  erp-net:
    driver: bridge

volumes:
  pgdata:
